# ==============================================================================
# Forge — Hyprland Configuration
# Theme: Catppuccin Mocha
# ==============================================================================

# --- Colour palette -----------------------------------------------------------
$rosewater = rgb(f5e0dc)
$flamingo  = rgb(f2cdcd)
$pink      = rgb(f5c2e7)
$mauve     = rgb(cba6f7)
$red       = rgb(f38ba8)
$maroon    = rgb(eba0ac)
$peach     = rgb(fab387)
$yellow    = rgb(f9e2af)
$green     = rgb(a6e3a1)
$teal      = rgb(94e2d5)
$sky       = rgb(89dceb)
$sapphire  = rgb(74c7ec)
$blue      = rgb(89b4fa)
$lavender  = rgb(b4befe)
$text      = rgb(cdd6f4)
$subtext1  = rgb(bac2de)
$overlay2  = rgb(9399b2)
$surface2  = rgb(585b70)
$surface1  = rgb(45475a)
$surface0  = rgb(313244)
$base      = rgb(1e1e2e)
$mantle    = rgb(181825)
$crust     = rgb(11111b)

# --- Monitor ------------------------------------------------------------------
monitor = , preferred, auto, 1

# --- Applications -------------------------------------------------------------
$terminal = ghostty
$launcher = rofi -show drun -show-icons
$browser  = firefox
$files    = thunar

# --- Autostart ----------------------------------------------------------------
exec-once = waybar
exec-once = hyprpaper
exec-once = swaync
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = xdg-user-dirs-update

# --- Environment variables ----------------------------------------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- General ------------------------------------------------------------------
general {
    gaps_in           = 4
    gaps_out          = 8
    border_size       = 2
    col.active_border = $mauve $blue 45deg
    col.inactive_border = $surface1
    resize_on_border  = true
    layout            = dwindle
}

# --- Decoration ---------------------------------------------------------------
decoration {
    rounding      = 8

    blur {
        enabled       = true
        size          = 6
        passes        = 3
        new_optimizations = true
        xray          = false
    }

    shadow {
        enabled       = true
        range         = 12
        render_power  = 3
        color         = rgba(1e1e2e88)
    }
}

# --- Animations ---------------------------------------------------------------
animations {
    enabled = true

    bezier = smooth,    0.05, 0.9, 0.1, 1.05
    bezier = linear,    0.0,  0.0, 1.0, 1.0
    bezier = overshot,  0.13, 0.99, 0.29, 1.1
    bezier = easeOut,   0.16, 1,    0.3,  1

    animation = windows,     1, 4,  smooth,   slide
    animation = windowsOut,  1, 3,  linear,   popin 80%
    animation = border,      1, 10, linear
    animation = fade,        1, 4,  linear
    animation = workspaces,  1, 5,  overshot, slidevert
}

# --- Input --------------------------------------------------------------------
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = true
        tap-to-click      = true
        disable_while_typing = true
    }
}

# --- Gestures -----------------------------------------------------------------
gestures {
    workspace_swipe       = true
    workspace_swipe_fingers = 3
}

# --- Layout: dwindle ----------------------------------------------------------
dwindle {
    pseudotile        = true
    preserve_split    = true
}

# --- Miscellaneous ------------------------------------------------------------
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
}

# ==============================================================================
# Key bindings
# ==============================================================================

$mod = SUPER

# --- Applications -------------------------------------------------------------
bind = $mod,       Return, exec, $terminal
bind = $mod,       B,      exec, $browser
bind = $mod,       E,      exec, $files
bind = $mod,       Space,  exec, $launcher

# --- Window management --------------------------------------------------------
bind = $mod,       Q,      killactive
bind = $mod,       F,      fullscreen, 0
bind = $mod,       M,      fullscreen, 1
bind = $mod,       V,      togglefloating
bind = $mod,       P,      pin
bind = $mod SHIFT, Space,  togglefloating

# --- Focus: vim + arrows ------------------------------------------------------
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# --- Move windows -------------------------------------------------------------
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# --- Resize -------------------------------------------------------------------
binde = $mod CTRL, H, resizeactive, -40 0
binde = $mod CTRL, L, resizeactive,  40 0
binde = $mod CTRL, K, resizeactive,  0 -40
binde = $mod CTRL, J, resizeactive,  0  40

# --- Workspaces ---------------------------------------------------------------
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# --- Mouse bindings -----------------------------------------------------------
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- System -------------------------------------------------------------------
bind = $mod,       L,      exec, hyprlock
bind = $mod SHIFT, S,      exec, grim -g "$(slurp)" - | wl-copy
bind = $mod,       S,      exec, grim - | wl-copy
bind = $mod SHIFT, N,      exec, swaync-client -t

# --- Media keys ---------------------------------------------------------------
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl s 10%-
bind = , XF86AudioPlay,         exec, playerctl play-pause
bind = , XF86AudioNext,         exec, playerctl next
bind = , XF86AudioPrev,         exec, playerctl previous

# --- Window rules -------------------------------------------------------------
windowrulev2 = float,   class:^(thunar)$, title:^(File Operation Progress)$
windowrulev2 = float,   class:^(pavucontrol)$
windowrulev2 = float,   class:^(blueman-manager)$
windowrulev2 = float,   class:^(nm-connection-editor)$
windowrulev2 = center,  class:^(pavucontrol)$
windowrulev2 = size 800 500, class:^(pavucontrol)$
windowrulev2 = opacity 0.92 0.92, class:^(ghostty)$
