# ==============================================================================
# Forge — Hyprlock Configuration
# Colors sourced from: ~/.config/hyprlock/colors.conf (generated by matugen)
# ==============================================================================

# Fallback palette — used on first boot before matugen has run.
$primary   = rgb(6750A4)
$bg        = rgb(1C1B1F)
$text      = rgb(E6E1E5)
$subtext   = rgb(CAC4D0)
$success   = rgb(80C6B8)
$error     = rgb(CF6679)
$warning   = rgb(CCC2DC)

# Generated colors override the fallback when matugen has run.
source = ~/.config/hyprlock/colors.conf

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.6
    contrast    = 0.9
    vibrancy    = 0.2
    vibrancy_darkness = 0.0
}

input-field {
    monitor         =
    size            = 280, 52
    outline_thickness = 2
    dots_size       = 0.25
    dots_spacing    = 0.18
    dots_center     = true
    outer_color     = $primary
    inner_color     = $bg
    font_color      = $text
    fade_on_empty   = true
    placeholder_text = <i>Password...</i>
    hide_input      = false
    position        = 0, -120
    halign          = center
    valign          = center
    check_color     = $success
    fail_color      = $error
    fail_text       = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color  = $warning
}

label {
    monitor     =
    text        = $TIME
    color       = $text
    font_size   = 64
    font_family = JetBrainsMono Nerd Font
    position    = 0, 80
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] date +"%A, %d %B %Y"
    color       = $subtext
    font_size   = 20
    font_family = JetBrainsMono Nerd Font
    position    = 0, 10
    halign      = center
    valign      = center
}
