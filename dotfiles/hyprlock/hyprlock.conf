# ==============================================================================
# Forge — Hyprlock Configuration
# Theme: Catppuccin Mocha
# ==============================================================================

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.6
    contrast    = 0.9
    vibrancy    = 0.2
    vibrancy_darkness = 0.0
}

input-field {
    monitor         =
    size            = 280, 52
    outline_thickness = 2
    dots_size       = 0.25
    dots_spacing    = 0.18
    dots_center     = true
    outer_color     = rgb(cba6f7)
    inner_color     = rgb(1e1e2e)
    font_color      = rgb(cdd6f4)
    fade_on_empty   = true
    placeholder_text = <i>Password...</i>
    hide_input      = false
    position        = 0, -120
    halign          = center
    valign          = center
    check_color     = rgb(a6e3a1)
    fail_color      = rgb(f38ba8)
    fail_text       = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color  = rgb(f9e2af)
}

label {
    monitor     =
    text        = $TIME
    color       = rgb(cdd6f4)
    font_size   = 64
    font_family = JetBrainsMono Nerd Font
    position    = 0, 80
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] date +"%A, %d %B %Y"
    color       = rgb(bac2de)
    font_size   = 20
    font_family = JetBrainsMono Nerd Font
    position    = 0, 10
    halign      = center
    valign      = center
}
